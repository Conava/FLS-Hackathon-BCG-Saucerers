name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install deps
        working-directory: backend
        run: uv sync --frozen

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check app

      - name: Mypy strict
        working-directory: backend
        run: uv run mypy app

      - name: Pytest
        working-directory: backend
        run: uv run pytest -v

      - name: OpenAPI drift check
        working-directory: backend
        run: |
          uv run python -m app.cli.export_openapi /tmp/openapi_fresh.json
          if ! diff -u openapi.json /tmp/openapi_fresh.json; then
            echo "ERROR: backend/openapi.json is out of date."
            echo "Run 'make openapi' and commit the updated file."
            exit 1
          fi
